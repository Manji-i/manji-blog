<!DOCTYPE html>
<html>
<head>
    <title>Marked Test</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <h1>Marked Test</h1>
    <div id="output"></div>
    <script>
        const markdown = "# Hello\n\n## World\n\n* Item 1\n* Item 2";
        const html = marked.parse(markdown);
        document.getElementById('output').innerHTML = html;
        console.log('Marked test result:', html);
    </script>
</body>
</html>
