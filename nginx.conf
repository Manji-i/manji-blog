server {
    listen 80;
    server_name manji.pro www.manji.pro;

    return 301 https://manji.pro$request_uri;
}

# Keep the server IP available as an HTTP-only fallback.
server {
    listen 80;
    server_name 14.103.45.4;

    client_max_body_size 10M;

    location / {
        root /blog/dist;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads {
        alias /blog/api/uploads;
    }
}

server {
    listen 443 ssl;
    server_name manji.pro www.manji.pro;

    ssl_certificate /etc/letsencrypt/live/manji.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manji.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 增加上传文件大小限制到 10MB
    client_max_body_size 10M;

    # Static files - React frontend
    location / {
        root /blog/dist;
        try_files $uri $uri/ /index.html;
    }

    # API proxy - Node.js backend (changed from 3000 to 3001)
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded files
    location /uploads {
        alias /blog/api/uploads;
    }
}
